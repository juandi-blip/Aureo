<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · AUREO</title>
    <meta name="description" content="Acceso seguro al sistema de control y logística de ferretería industrial AUREO.">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-glow-1"></div>
    <div class="login-glow-2"></div>

    <div class="login-shell">
        <div class="login-card">
            <!-- Marca -->
            <div class="login-brand">
                <div class="login-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#1B2230" stroke-width="1.9" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="11" r="5.1" />
                        <ellipse cx="12" cy="11" rx="10.6" ry="3.5" transform="rotate(-24 12 11)" />
                    </svg>
                </div>
                <div class="login-brand-text">
                    <span class="brand-name">AUREO</span>
                    <span class="brand-sub">Control &amp; Logística Industrial</span>
                </div>
            </div>

            <div class="login-heading">
                <h1>Iniciar Sesión</h1>
                <p>Ingresa tus credenciales para acceder al panel de operaciones.</p>
            </div>

            <form id="login-form" novalidate>
                <!-- Usuario -->
                <div class="login-field">
                    <label for="login-username">Usuario</label>
                    <div class="field-input-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="login-username" name="username" placeholder="Ej: admin"
                            autocomplete="username" autofocus>
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="login-field">
                    <label for="login-password">Contraseña</label>
                    <div class="field-input-wrap">
                        <svg class="field-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="password" id="login-password" name="password" placeholder="••••••••"
                            autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-password"
                            aria-label="Mostrar contraseña">
                            <svg class="icon-eye" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg class="icon-eye-off" viewBox="0 0 24 24" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Mensaje de error -->
                <div class="login-error" id="login-error">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span class="error-text">Credenciales inválidas.</span>
                </div>

                <!-- Botón -->
                <button type="submit" class="login-submit" id="login-submit">
                    <span class="btn-spinner"></span>
                    <span class="btn-label">Acceder al Sistema</span>
                    <svg class="btn-arrow" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </button>
            </form>

            <!-- Cuentas demo (clic para autocompletar) -->
            <div class="login-demo">
                <div class="login-demo-title">Cuentas de demostración</div>
                <div class="demo-accounts">
                    <div class="demo-account" data-user="admin" data-pass="admin123">
                        <span class="demo-cred"><strong>admin</strong> / admin123</span>
                        <span class="demo-role">Admin</span>
                    </div>
                    <div class="demo-account" data-user="warehouse" data-pass="warehouse123">
                        <span class="demo-cred"><strong>warehouse</strong> / warehouse123</span>
                        <span class="demo-role">Depósito</span>
                    </div>
                    <div class="demo-account" data-user="cashier" data-pass="cashier123">
                        <span class="demo-cred"><strong>cashier</strong> / cashier123</span>
                        <span class="demo-role">Caja</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Autocompletar al hacer clic en una cuenta demo
        document.querySelectorAll('.demo-account').forEach(acc => {
            acc.addEventListener('click', () => {
                document.getElementById('login-username').value = acc.dataset.user;
                document.getElementById('login-password').value = acc.dataset.pass;
                document.getElementById('login-username').dispatchEvent(new Event('input'));
            });
        });
    </script>
</body>

</html>
